## Add your compose file here
services:
  split:
    image: ghcr.io/sertaykabuk/splitwise:main
    container_name: split-container
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
    volumes:
      - split_data:/app/data
    restart: unless-stopped
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.split.entrypoints=websecure"
      - "traefik.http.routers.split.rule=Host(`split.sertay.com`)"
      - "traefik.http.routers.split.tls.certresolver=myresolver"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.services.split.loadbalancer.server.port=3000"
    networks:
      - traefik_network

networks:
  traefik_network:
    external: true

volumes:
  split_data:
